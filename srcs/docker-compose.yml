services:

  mariadb:
    build: requirements/mariadb
    image: mariadb
    container_name: mariadb
    env_file: .env
    volumes:
      - wp-db:/var/lib/mysql
    networks:
      - inception
    restart: unless-stopped

  wordpress:
    build: requirements/wordpress
    image: wordpress
    container_name: wordpress
    env_file: .env
    volumes:
      - wp-files:/var/www/html
    networks:
      - inception
    depends_on:
      - mariadb
    restart: unless-stopped

  nginx:
    build: requirements/nginx
    image: nginx
    container_name: nginx
    env_file: .env
    ports:
      - "443:443"
    volumes:
      - wp-files:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress
    restart: unless-stopped

  redis:
    build: requirements/bonus/redis
    image: redis
    container_name: redis
    networks:
      - inception
    restart: unless-stopped

  ftp:
    build: requirements/bonus/ftp
    image: ftp
    container_name: ftp
    env_file: .env
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    volumes:
      - wp-files:/var/www/html
    networks:
      - inception
    restart: unless-stopped

  static:
    build: requirements/bonus/static
    image: static
    container_name: static
    ports:
      - "8081:8081"
    networks:
      - inception
    restart: unless-stopped

  adminer:
    build: requirements/bonus/adminer
    image: adminer
    container_name: adminer
    ports:
      - "8080:8080"
    networks:
      - inception
    depends_on:
      - mariadb
    restart: unless-stopped

  portainer:
    build: requirements/bonus/portainer
    image: portainer
    container_name: portainer
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - inception
    restart: unless-stopped

volumes:
  wp-db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lucpardo/data/db
  wp-files:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lucpardo/data/wordpress

networks:
  inception:
    driver: bridge
